version: '3.9'

services:
  # System MCPs (Python - FastAPI)

  config-mcp:
    build:
      context: ./config-mcp-server
      dockerfile: Dockerfile
    ports:
      - "7100:7100"
    environment:
      PORT: 7100
    networks:
      - mcp-network
    restart: unless-stopped

  auth-mcp:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./auth-mcp-server/auth_mcp.py:/app/auth_mcp.py
    command: bash -c "pip install -q fastapi uvicorn pydantic && python auth_mcp.py"
    ports:
      - "7103:7103"
    environment:
      PORT: 7103
    networks:
      - mcp-network
    restart: unless-stopped

