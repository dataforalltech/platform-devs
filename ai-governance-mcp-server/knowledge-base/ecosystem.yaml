# ecosystem.yaml — fonte declarativa do grafo de repositórios/serviços/contratos
#
# Este arquivo alimenta o EcosystemGraph (in-memory networkx).
# Edite com revisão humana — assim como qualquer arquivo de governança.
#
# Convenções:
#   - Identificadores são canônicos e únicos.
#   - status: active | deprecated | planned
#   - kinds válidos: repository | service | library | contract | team | port
#   - Use deprecated_by para apontar para o canônico atual.
#
# Fonte da verdade para nomes/portas/responsabilidades:
#   - AGENTS.md §47 (tabela de portas)
#   - AGENTS.md §49 (mapa de responsabilidades)
#   - DEVOPS_STANDARDS.md §3
#
# Última revisão: 2026-05-08.

nodes:
  # ============================================================== #
  # TEAMS                                                          #
  # ============================================================== #
  - id: platform-team
    kind: team
    name: Platform Team
    owner: caiog

  # ============================================================== #
  # LIBRARIES PRIVADAS                                             #
  # Mudanças exigem LIB CHANGE REQUEST aprovado por @caiog (§18). #
  # ============================================================== #
  - id: platform-core-lib
    kind: library
    status: active
    description: Utilitários compartilhados (logger, settings base, helpers).
    governance: lib_change_request_required

  - id: platform-database-lib
    kind: library
    status: active
    description: Acesso a banco multi-tenant (Postgres + MySQL).
    governance: lib_change_request_required

  - id: platform-files-lib
    kind: library
    status: active
    description: Operações de arquivo (datalake, S3, local).
    governance: lib_change_request_required

  - id: platform-db-vector
    kind: library
    status: active
    description: Acesso a vector store. Consumida por agents-factory.
    governance: lib_change_request_required

  - id: platform-auth-lib
    kind: library
    status: active
    description: JWT validation (decode_token, _verify_token), service tokens, JWTManager FastAPI dependency.
    governance: lib_change_request_required
    notes:
      - "decode_token e _verify_token são idênticos — decode_token é alias público de _verify_token."
      - "Ambas respeitam AUTH_DEV_BYPASS=true quando ENVIRONMENT=development (skip signature check)."
      - "Preferir decode_token em código de serviços (API pública, não função prefixada com _)."

  - id: platform-ws-lib
    kind: library
    status: active
    description: WebSocket ConnectionManager, WSRouter (autenticação JWT por query param), register_ws_routers.
    governance: lib_change_request_required
    notes:
      - "WSRouter usa decode_token — respeita AUTH_DEV_BYPASS."
      - "ConnectionManager.connect() armazena List[WebSocket] por session_id (não single value)."
      - "Session ID format: {prefix}:{tenant_id}:{sub}."

  - id: platform-events-lib
    kind: library
    status: active
    description: Kafka event bus (producer/consumer), ConsumerManager, build_event_bus.
    governance: lib_change_request_required

  - id: platform-tenant-lib
    kind: library
    status: active
    description: TenantMiddleware (valida X-Tenant-Id), isolamento de schema por tenant.
    governance: lib_change_request_required
    notes:
      - "Só processa escopo HTTP — conexões WebSocket passam sem interceptação (BaseHTTPMiddleware ignora WS)."

  - id: platform-log-lib
    kind: library
    status: active
    description: Schemas de log de operação, BaseLogRepository e SlowRequestLogMiddleware.
    governance: lib_change_request_required

  - id: platform-observability-lib
    kind: library
    status: active
    description: Setup OpenTelemetry, Sentry, security headers, rate limiting (slowapi).
    governance: lib_change_request_required

  - id: platform-data-types-lib
    kind: library
    status: active
    description: DataTypeWrangler — mapeamento canônico de tipos entre engines de banco.
    governance: lib_change_request_required

  - id: platform-docextract-lib
    kind: library
    status: active
    description: Primitivas de processamento de documentos para pipelines RAG.
    governance: lib_change_request_required

  - id: platform-agents-lib
    kind: library
    status: active
    description: Modular foundation for AI agents (DataforAll Agents Library).
    governance: lib_change_request_required

  - id: platform-skills-lib
    kind: library
    status: active
    description: Skills library para Claude Code e agentes da plataforma.
    governance: lib_change_request_required

  # ============================================================== #
  # PORTS — desenvolvimento local (canônica = AGENTS.md §47)       #
  # ============================================================== #
  - { id: port-8001, kind: port, description: platform-auth }
  - { id: port-8002, kind: port, description: platform-admin }
  - { id: port-8003, kind: port, description: platform-governance }
  - { id: port-8004, kind: port, description: platform-analytics }
  - { id: port-8005, kind: port, description: platform-scheduler }
  - { id: port-8006, kind: port, description: platform-connectors }
  - { id: port-8007, kind: port, description: platform-ml }
  - { id: port-8008, kind: port, description: platform-cloud }
  - { id: port-8009, kind: port, description: platform-monitor }
  - { id: port-8010, kind: port, description: platform-notification }
  - { id: port-8011, kind: port, description: platform-communication }
  - { id: port-8012, kind: port, description: platform-dataquality }
  - { id: port-8013, kind: port, description: platform-docextract }
  - { id: port-8014, kind: port, description: dataforall-agents-factory }
  - { id: port-8015, kind: port, description: dataforall-rag-service }
  - { id: port-8016, kind: port, description: platform-datalake }
  - { id: port-8017, kind: port, description: platform-cdc }
  - { id: port-8018, kind: port, description: platform-api-gateway }
  - { id: port-8019, kind: port, description: platform-iceberg }
  - { id: port-8020, kind: port, description: platform-flow }
  - { id: port-8021, kind: port, description: platform-security }
  - { id: port-8080, kind: port, description: dataforall-ui-connect }

  # ============================================================== #
  # SERVICES (ativos) — ordenados por porta                        #
  # ============================================================== #
  - id: platform-service-template
    kind: service
    status: active
    description: Template canônico Python/FastAPI para novos serviços.

  - id: platform-auth
    kind: service
    status: active
    port: 8001
    gateway_prefix: /auth
    description: Emite JWT, JWKS, service tokens, login/logout/refresh, registry PLATFORM_SERVICES.
    explicit_non_responsibilities:
      - gestão de perfil de usuário
      - enforcement de permissão a nível de query

  - id: platform-admin
    kind: service
    status: active
    port: 8002
    gateway_prefix: /admin
    description: Usuários, domínios, tenants, perfis, times, role assignments, IAM.
    explicit_non_responsibilities:
      - emissão de JWT
      - enforcement de permissão a request time

  - id: platform-governance
    kind: service
    status: active
    port: 8003
    gateway_prefix: /governance
    description: Políticas RLS, row-level security, cache de permissões, controle de acesso a módulo.
    explicit_non_responsibilities:
      - CRUD de usuário
      - emissão de token

  - id: platform-analytics
    kind: service
    status: active
    port: 8004
    gateway_prefix: /bi
    description: Dashboards BI, plataformas (Power BI, Looker, Tableau, Metabase, Superset), dashboards, grupos, playlists, sincronização — HTTP e WebSocket /ws/bi/*.
    explicit_non_responsibilities:
      - ingestão raw
      - computações ML
      - gestão de usuário
    notes:
      - "Porta 8004 (host, fora do Docker). GATEWAY_MAPPING: http://host.docker.internal:8004."
      - "Histórico: ficou em 12000 entre 2026-05-04 e 2026-05-07; revertido para 8004 (canônica per docker-compose SERVICE_PORT default)."
      - "gateway_prefix /bi corrigido em 2026-05-07 (era /analytics — incompatível com rotas internas)."
      - "Autenticação WS: usa decode_token (platform-auth-lib) — respeita AUTH_DEV_BYPASS."
      - "JWT_SECRET_KEY deve bater com platform-auth Docker: XrDsCv3galowl... (ver .env.dev.local)."

  - id: platform-scheduler
    kind: service
    status: active
    port: 8005
    gateway_prefix: /schedulers
    description: Definições de cron task, execução agendada, histórico, endpoint URL_SCHEDULER.
    explicit_non_responsibilities:
      - executar a lógica do que a task faz

  - id: platform-connectors
    kind: service
    status: active
    port: 8006
    gateway_prefix: /connectors
    description: Repositório canônico de conectores (40+ adapters, credenciais externas).
    explicit_non_responsibilities:
      - rodar pipelines
      - rodar ML
      - entregar dados

  - id: platform-ml
    kind: service
    status: active
    port: 8007
    gateway_prefix: /ml
    description: NLP, OCR, clustering, time series, model serving, catálogo de algoritmos.
    explicit_non_responsibilities:
      - embeddings  # rag-service é owner
      - gestão de fontes de dados
      - orquestração de pipeline
      - scheduling

  - id: platform-cloud
    kind: service
    status: active
    port: 8008
    gateway_prefix: /cloud
    description: Provisionamento de infraestrutura (Terraform), gestão de recursos cloud.
    explicit_non_responsibilities:
      - deploy de aplicação (CI/CD)
      - execução de pipeline

  - id: platform-monitor
    kind: service
    status: active
    port: 8009
    gateway_prefix: /monitor
    description: Regras de alerta, monitoramento de threshold, dispatch via webhook/email.
    notes: quality_monitor migrou para platform-dataquality em 2026-Q1.

  - id: platform-notification
    kind: service
    status: active
    port: 8010
    gateway_prefix: /notifications
    description: WebSocket push para /ws/notifications (pessoal) e /ws/queue (progresso).
    explicit_non_responsibilities:
      - enviar mensagens reais  # platform-communication faz isso

  - id: platform-communication
    kind: service
    status: active
    port: 8011
    gateway_prefix: /communication
    description: Entrega de email, SMS, WhatsApp, push notifications, templates.
    explicit_non_responsibilities:
      - lógica de roteamento de notificação
      - gestão de preferências de usuário

  - id: platform-dataquality
    kind: service
    status: active
    port: 8012
    gateway_prefix: /dataquality
    description: Regras de qualidade de dados, runs de validação, métricas DQ. Recebeu quality_monitor de platform-monitor.
    explicit_non_responsibilities:
      - ingestão de dados
      - execução de pipeline

  - id: platform-docextract
    kind: service
    status: active
    port: 8013
    gateway_prefix: /docextract
    description: Parsing de documento (PDF/imagens → JSON estruturado).
    explicit_non_responsibilities:
      - classificação ML do conteúdo extraído

  - id: dataforall-agents-factory
    kind: service
    status: active
    port: 8014
    gateway_prefix: /agents
    description: Agentes IA, orquestração de LLM, histórico de chat, WebSocket /chat, execução de tools.
    aliases:
      - agents-factory  # nome curto histórico
      - platform-agents-factory  # nome no pyproject de algumas versões
    explicit_non_responsibilities:
      - treinamento ML raw
      - scheduling de tasks
      - entrega de email

  - id: dataforall-rag-service
    kind: service
    status: active
    port: 8015
    gateway_prefix: /rag
    description: Owner único de RAG e embeddings.
    aliases:
      - rag-service  # nome curto histórico
    owns:
      - rag
      - embeddings

  - id: platform-datalake
    kind: service
    status: active
    port: 8016
    description: Metadata do data lake, catálogo, queries DuckDB sobre parquet.
    explicit_non_responsibilities:
      - execução de pipeline
      - enforcement de qualidade
      - ingestão de dados

  - id: platform-cdc
    kind: service
    status: active
    port: 8017
    description: Change Data Capture de DBs source → datalake, eventos Kafka.
    explicit_non_responsibilities:
      - checks de qualidade
      - queries de analytics
      - execução de pipeline

  - id: platform-api-gateway
    kind: service
    status: active
    port: 8018
    description: Roteamento de requests, circuit breaker. Entrada única do tráfego externo.

  - id: platform-iceberg
    kind: service
    status: active
    port: 8019
    description: Apache Iceberg layer sobre o datalake.

  - id: platform-flow
    kind: service
    status: active
    port: 8020
    gateway_prefix: /flow
    description: Orquestração de flows.

  - id: platform-security
    kind: service
    status: active
    port: 8021
    gateway_prefix: /security
    description: Controles de segurança transversais.

  - id: platform-pipeline
    kind: service
    status: active
    description: Definições de pipeline, grafo de execução, orquestração de step. Sem porta alocada (interno).
    explicit_non_responsibilities:
      - steps de ML  # delegar a platform-ml
      - acesso a connector  # via platform-connectors
      - scheduling  # → platform-scheduler

  - id: dataforall-ui-connect
    kind: service
    status: active
    port: 8080
    description: Frontend do produto.

  - id: platform-dai
    kind: service
    status: active
    description: Plataforma DAI (Data + AI). Hospeda subserviços incluindo platform-mcp.
    notes:
      - "platform-mcp é um subserviço deste — repositório platform-mcp permanece como placeholder até consolidação."

  - id: platform-notebook
    kind: service
    status: active
    description: Notebook execution environment compatível com Jupyter para análises ad-hoc.

  - id: platform-operation
    kind: service
    status: active
    description: Implantação, exclusão e gestão das plataformas de clientes (multi-tenancy operations).
    notes:
      - "Substituiu run_clients (mantido como deprecated)."

  - id: dataforall-platform-backend
    kind: service
    status: active
    description: Backend do produto DataforAll, camada acima dos platform-* services.

  - id: dataforall-management
    kind: service
    status: active
    description: Frontend administrativo (TypeScript) para gestão da plataforma.

  - id: finance-platform-frontend
    kind: service
    status: active
    description: Frontend do produto Finance (TypeScript) — produto novo da DataforAll.
    notes:
      - "Stack TypeScript, fora do template Python."

  - id: data-plataform-v20
    kind: service
    status: active
    description: Data Platform v2.0 — versão atual da plataforma de dados (JavaScript stack).
    notes:
      - "Stack JavaScript, paralela ao stack platform-* Python. Substitui platform-19 (v1.9)."

  - id: common-platform
    kind: service
    status: active
    description: Microserviço Java compartilhado da plataforma DataforAll (em produção).
    notes:
      - "Stack Java, fora do template Python."

  - id: database-manager
    kind: service
    status: active
    description: Microserviço Java de gestão de bancos da plataforma DataforAll (em produção).
    notes:
      - "Stack Java, fora do template Python."

  - id: processor-platform
    kind: service
    status: active
    description: Microserviço Java de processamento da plataforma DataforAll (em produção).
    notes:
      - "Stack Java, fora do template Python."

  # ============================================================== #
  # SERVICES (deprecados)                                          #
  # ============================================================== #
  - id: connectors-platform
    kind: service
    status: deprecated
    description: Substituído por platform-connectors.

  - id: schedule-platform
    kind: service
    status: deprecated
    description: Substituído por platform-scheduler.

  - id: run_clients
    kind: service
    status: deprecated
    description: Substituído por platform-operation.
    aliases:
      - run_clients-deprecated  # nome real do repositório no GitHub

  - id: finance-platform-new_product
    kind: service
    status: deprecated
    description: Produto Finance antigo. Iteração atual em finance-platform-frontend.
    aliases:
      - finance-platform-new_product-  # nome real no GitHub (com dash final)

  - id: platform-19
    kind: service
    status: deprecated
    description: Versão antiga (v1.9) da plataforma de dados. Substituído por data-plataform-v20.

  # ============================================================== #
  # CONTRATOS — APIs e eventos                                     #
  # ============================================================== #
  # APIs (HTTP)
  - { id: auth.jwt.api, kind: contract, contract_type: api, description: Emissão e validação de JWT (platform-auth). }
  - { id: auth.jwks.api, kind: contract, contract_type: api, description: JWKS público em /.well-known/jwks.json. }
  - { id: admin.iam.api, kind: contract, contract_type: api, description: API IAM (platform-admin) referenciada como URL_IAM. }
  - { id: governance.permissions.api, kind: contract, contract_type: api, description: API de RLS / permissões (platform-governance). }
  - { id: scheduler.cron.api, kind: contract, contract_type: api, description: API de cron tasks (platform-scheduler) referenciada como URL_SCHEDULER. }
  - { id: connectors.credentials.api, kind: contract, contract_type: api, description: API de credentials de fontes externas (platform-connectors). }
  - { id: ml.inference.api, kind: contract, contract_type: api, description: API de inferência ML (platform-ml). }
  - { id: communication.send.api, kind: contract, contract_type: api, description: API de envio de mensagem (platform-communication). }
  - { id: dataquality.checks.api, kind: contract, contract_type: api, description: API de checks DQ (platform-dataquality). }
  - { id: docextract.parse.api, kind: contract, contract_type: api, description: API de parsing de documentos (platform-docextract). }
  - { id: rag.search.api, kind: contract, contract_type: api, description: API de busca semântica (rag-service). }
  - { id: rag.embeddings.api, kind: contract, contract_type: api, description: API de geração de embeddings (rag-service). }
  - { id: datalake.query.api, kind: contract, contract_type: api, description: API de queries DuckDB sobre o datalake. }
  - { id: notifications.ws, kind: contract, contract_type: api, description: WebSocket /ws/notifications + /ws/queue (platform-notification). }
  - { id: analytics.bi.ws, kind: contract, contract_type: api, description: "WebSocket /ws/bi/* — platforms, dashboards, groups, playlists, sync, permissions (platform-analytics). Snapshot-on-connect + ping loop 25s." }

  # Eventos (Kafka)
  - { id: cdc.changes.v1, kind: contract, contract_type: event, description: Stream de mudanças CDC. }
  - { id: scheduler.jobs.v1, kind: contract, contract_type: event, description: Eventos triggered/completed do scheduler. }
  - { id: quality.metrics.v1, kind: contract, contract_type: event, description: Métricas de qualidade (platform-dataquality). }
  - { id: user.created.v1, kind: contract, contract_type: event, description: Evento publicado por platform-auth ao criar usuário. }
  - { id: user.notification.v1, kind: contract, contract_type: event, description: Evento de notificação consumido por platform-notification. }
  - { id: task.progress.v1, kind: contract, contract_type: event, description: Eventos de progresso de task (consumido por platform-notification). }

