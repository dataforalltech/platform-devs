      - "type=system"
      - "language=python"

  infra-mcp:
    build:
      context: .
      dockerfile: infra-mcp-server/Dockerfile
    ports:
      - "27107:7100"
    environment:
      PYTHONPATH: /app:/app/shared
      INFRA_PG_HOST: postgres
      INFRA_PG_PORT: 5432
      INFRA_PG_DB: platform_dev
      INFRA_PG_USER: postgres
      INFRA_PG_PASSWORD: postgres
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7100/v1/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
