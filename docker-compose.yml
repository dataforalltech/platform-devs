      PORT: 7100
    networks:
      - mcp-network
    restart: unless-stopped
    labels:
      - "mcp=backzilla-mcp"
      - "type=zilla"

  frontzilla-mcp:
    build:
      context: .
      dockerfile: ./frontzilla-mcp-server/Dockerfile
    ports:
      - "7120:7100"
    environment:
      PORT: 7100
    networks:
      - mcp-network
    restart: unless-stopped
    labels:
      - "mcp=frontzilla-mcp"
      - "type=zilla"

  opszilla-mcp:
    build:
      context: .
      dockerfile: ./opszilla-mcp-server/Dockerfile
    ports:
      - "7121:7100"
    environment:
      NODE_ENV: production
      PORT: 7100
    networks:
      - mcp-network
    restart: unless-stopped
    labels:
