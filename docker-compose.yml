version: '3.9'

services:
  # ============================================================================
  # System MCPs (Python - FastAPI)
  # ============================================================================

  agent-twin-mcp:
    build:
      context: .
      dockerfile: agent-twin-mcp-server/Dockerfile
    ports:
      - "27101:7100"
    environment:
      PYTHONPATH: /app:/app/shared
      TWIN_PG_HOST: postgres
      TWIN_PG_PORT: 5432
      TWIN_PG_DB: platform_dev
      TWIN_PG_USER: postgres
      TWIN_PG_PASSWORD: postgres
      TWIN_ADMIN_TOKEN: ${TWIN_ADMIN_TOKEN:-sgqBj52MF2CH3-IBOvflNoyeH-1XN6BmBF7oZzIT9Hs}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7100/v1/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - mcp-network
    restart: unless-stopped
    labels:
      - "mcp=agent-twin-mcp"
      - "type=system"
      - "language=python"

  config-mcp:
    build:
      context: .
      dockerfile: config-mcp-server/Dockerfile
    ports:
      - "27102:7099"
    environment:
      PYTHONPATH: /app:/app/shared
      CONFIG_MCP_MASTER_KEY: ${CONFIG_MCP_MASTER_KEY}
      MCP_PORT: "7099"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7099/v1/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - mcp-network
    restart: unless-stopped
    labels:
      - "mcp=config-mcp"
      - "type=system"
      - "language=python"

  session-mcp:
