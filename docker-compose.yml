      - "type=system"
      - "language=python"

  pipeline-mcp:
    build:
      context: .
      dockerfile: pipeline-mcp-server/Dockerfile
    ports:
      - "27108:7100"
    environment:
      PYTHONPATH: /app:/app/shared
      PG_DSN: "postgresql://postgres:postgres@postgres/platform_dev"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7100/v1/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - mcp-network
    restart: unless-stopped
    labels:
      - "mcp=pipeline-mcp"
      - "type=system"
      - "language=python"

  qa-mcp:
    build:
      context: .
      dockerfile: qa-mcp-server/Dockerfile
    ports:
      - "27109:7100"
    environment:
      PYTHONPATH: /app:/app/shared
      PG_DSN: "postgresql://postgres:postgres@postgres/platform_dev"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7100/v1/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - mcp-network
    restart: unless-stopped
    labels:
      - "mcp=qa-mcp"
      - "type=system"
      - "language=python"

  services-mcp:
    build:
      context: .
      dockerfile: services-mcp-server/Dockerfile
    ports:
      - "27110:7100"
    environment:
      PYTHONPATH: /app:/app/shared
      PG_DSN: "postgresql://postgres:postgres@postgres/platform_dev"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7100/v1/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - mcp-network
    restart: unless-stopped
    labels:
      - "mcp=services-mcp"
      - "type=system"
      - "language=python"

  test-mcp:
    build:
      context: .
      dockerfile: test-mcp-server/Dockerfile
    ports:
      - "27111:7100"
    environment:
      PYTHONPATH: /app:/app/shared
      TEST_PG_HOST: postgres
      TEST_PG_PORT: 5432
      TEST_PG_DB: platform_dev
      TEST_PG_USER: postgres
      TEST_PG_PASSWORD: postgres
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7100/v1/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - mcp-network
    restart: unless-stopped
    labels:
      - "mcp=test-mcp"
      - "type=system"
      - "language=python"

  ai-governance-mcp:
    build:
      context: .
      dockerfile: ai-governance-mcp-server/Dockerfile
    ports:
      - "27112:7100"
    volumes:
      - ./ai-governance-mcp-server/knowledge-base:/app/knowledge-base
    environment:
      PYTHONPATH: /app:/app/shared
      GOVERNANCE_KB_PATH: /app/knowledge-base
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7100/v1/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - mcp-network
    restart: unless-stopped
    labels:
      - "mcp=ai-governance-mcp"
      - "type=system"
      - "language=python"

  # ============================================================================
  # Domain MCPs — Trinity pattern (REST API + Lib + MCP por servico)
  # ============================================================================

  analytics-mcp:
    build:
      context: ../platform-analytics
      dockerfile: Dockerfile.mcp
    ports:
      - "27113:7100"
    environment:
      PYTHONPATH: /app
      ANALYTICS_MCP_ANALYTICS_URL: "http://host.docker.internal:8000"
      ANALYTICS_MCP_INTERNAL_API_TOKEN: ${ANALYTICS_INTERNAL_TOKEN:-dev-internal-token-replace-me}
      ANALYTICS_MCP_DEFAULT_TENANT_ID: ${ANALYTICS_DEFAULT_TENANT_ID:-}
      MCP_PORT: "7100"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7100/v1/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - mcp-network
    restart: unless-stopped
    labels:
      - "mcp=analytics-mcp"
      - "type=domain"
      - "language=python"
      - "service=platform-analytics"

  # ============================================================================
  # Zilla MCPs (Node.js - já vêm em Docker)
  # ============================================================================

  archzilla-mcp:
    build:
      context: .
      dockerfile: ./archzilla-mcp-server/Dockerfile
    ports:
      - "27118:7100"
    environment:
      NODE_ENV: production
      PORT: 7100
    networks:
      - mcp-network
    restart: unless-stopped
    labels:
      - "mcp=archzilla-mcp"
      - "type=zilla"
      - "language=nodejs"

  backzilla-mcp:
    build:
      context: .
      dockerfile: ./backzilla-mcp-server/Dockerfile
    ports:
      - "27119:7100"
    environment:
      NODE_ENV: production
      PORT: 7100
    networks:
      - mcp-network
    restart: unless-stopped
    labels:
      - "mcp=backzilla-mcp"
      - "type=zilla"

  frontzilla-mcp:
    build:
      context: .
      dockerfile: ./frontzilla-mcp-server/Dockerfile
    ports:
      - "27120:7100"
    environment:
      PORT: 7100
    networks:
      - mcp-network
    restart: unless-stopped
    labels:
      - "mcp=frontzilla-mcp"
      - "type=zilla"

  opszilla-mcp:
    build:
      context: .
      dockerfile: ./opszilla-mcp-server/Dockerfile
    ports:
      - "27121:7100"
    environment:
      NODE_ENV: production
      PORT: 7100
    networks:
      - mcp-network
    restart: unless-stopped
    labels:
      - "mcp=opszilla-mcp"
      - "type=zilla"

  pozilla-mcp:
    build:
      context: .
      dockerfile: ./pozilla-mcp-server/Dockerfile
    ports:
      - "27122:7100"
    environment:
      NODE_ENV: production
      PORT: 7100
    networks:
      - mcp-network
    restart: unless-stopped
    labels:
      - "mcp=pozilla-mcp"
      - "type=zilla"

  productzilla-mcp:
    build:
      context: .
      dockerfile: ./productzilla-mcp-server/Dockerfile
    ports:
      - "27123:7100"
    environment:
      NODE_ENV: production
      PORT: 7100
    networks:
      - mcp-network
    restart: unless-stopped
    labels:
      - "mcp=productzilla-mcp"
      - "type=zilla"

  qazilla-mcp:
    build:
      context: .
      dockerfile: ./qazilla-mcp-server/Dockerfile
    ports:
      - "27124:7100"
    environment:
      NODE_ENV: production
      PORT: 7100
    networks:
      - mcp-network
    restart: unless-stopped
    labels:
      - "mcp=qazilla-mcp"
      - "type=zilla"

  seczilla-mcp:
    build:
      context: .
      dockerfile: ./seczilla-mcp-server/Dockerfile
    ports:
      - "27125:7100"
    environment:
      NODE_ENV: production
      PORT: 7100
    networks:
      - mcp-network
    restart: unless-stopped
    labels:
      - "mcp=seczilla-mcp"
      - "type=zilla"

  # ============================================================================
  # MCP Gateway / Registry (Optional - discovers all MCPs)
  # ============================================================================

  mcp-gateway:
    build:
      context: ./mcp-gateway
      dockerfile: Dockerfile
    ports:
      - "28080:8080"
    environment:
      PORT: 8080
    depends_on:
      - redis
      - postgres
      - agent-twin-mcp
      - config-mcp
      - session-mcp
      - audit-mcp
      - deploy-mcp
      - docs-mcp
      - infra-mcp
      - pipeline-mcp
      - qa-mcp
      - services-mcp
      - test-mcp
      - ai-governance-mcp
      - qazilla-mcp
      - backzilla-mcp
      - archzilla-mcp
      - seczilla-mcp
      - opszilla-mcp
      - productzilla-mcp
      - frontzilla-mcp
      - pozilla-mcp
    networks:
      - mcp-network
    restart: unless-stopped
    labels:
      - "service=mcp-gateway"
      - "type=gateway"

  mcp-registry:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./mcp-registry.py:/app/mcp-registry.py
    command: bash -c "pip install fastapi uvicorn aiohttp && python mcp-registry.py"
    ports:
      - "28000:8000"
    environment:
      PORT: 8000
    depends_on:
      - config-mcp
      - agent-twin-mcp
      - archzilla-mcp
    networks:
      - mcp-network
    restart: unless-stopped
    labels:
      - "service=mcp-registry"
      - "type=gateway"

  # ============================================================================
  # Infrastructure Services (Redis + PostgreSQL for gateway)
  # ============================================================================

  redis:
    image: redis:7-alpine
    networks:
      - mcp-network
    restart: unless-stopped
    labels:
      - "service=redis"
      - "type=infrastructure"

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: platform_dev
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - mcp-network
    restart: unless-stopped
    labels:
      - "service=postgres"
      - "type=infrastructure"

networks:
  mcp-network:
    driver: bridge

# ============================================================================
# Volume Definitions (for persistence if needed)
# ============================================================================
volumes:
  config-data:
  session-data:
  auth-data:
  postgres-data:
