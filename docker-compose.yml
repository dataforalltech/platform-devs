      dockerfile: audit-mcp-server/Dockerfile
    ports:
      - "27104:7100"
    environment:
      PYTHONPATH: /app:/app/shared
      AUDIT_PG_HOST: postgres
      AUDIT_PG_PORT: 5432
      AUDIT_PG_DB: platform_dev
      AUDIT_PG_USER: postgres
      AUDIT_PG_PASSWORD: postgres
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7100/v1/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - mcp-network
    restart: unless-stopped
    labels:
      - "mcp=audit-mcp"
      - "type=system"
      - "language=python"

  deploy-mcp:
    build:
      context: .
      dockerfile: deploy-mcp-server/Dockerfile
    ports:
      - "27105:7100"
    environment:
      PYTHONPATH: /app:/app/shared
      DEPLOY_GITHUB_TOKEN: ${DEPLOY_GITHUB_TOKEN}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7100/v1/health', timeout=5)"]
      interval: 30s
