    environment:
      PYTHONPATH: /app:/app/shared
      SESSION_PG_HOST: postgres
      SESSION_PG_PORT: 5432
      SESSION_PG_DB: platform_dev
      SESSION_PG_USER: postgres
      SESSION_PG_PASSWORD: postgres
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7100/v1/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - mcp-network
    restart: unless-stopped
    labels:
      - "mcp=session-mcp"
      - "type=system"
      - "language=python"

  audit-mcp:
