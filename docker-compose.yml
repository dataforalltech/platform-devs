  # ============================================================================
  # MCP Gateway / Registry (Optional - discovers all MCPs)
  # ============================================================================

  mcp-gateway:
    build:
      context: .
      dockerfile: ./mcp-gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
    depends_on:
      - redis
      - postgres
      - agent-twin-mcp
      - config-mcp
      - session-mcp
      - audit-mcp
      - deploy-mcp
      - docs-mcp
      - infra-mcp
      - pipeline-mcp
      - qa-mcp
      - services-mcp
      - test-mcp
      - ai-governance-mcp
      - qazilla-mcp
      - backzilla-mcp
      - archzilla-mcp
      - seczilla-mcp
      - opszilla-mcp
      - productzilla-mcp
      - frontzilla-mcp
      - pozilla-mcp
    networks:
      - mcp-network
    restart: unless-stopped
    labels:
      - "service=mcp-gateway"
      - "type=gateway"

  mcp-registry:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./mcp-registry.py:/app/mcp-registry.py
    command: bash -c "pip install fastapi uvicorn && python mcp-registry.py"
    ports:
      - "8000:8000"
    environment:
      PORT: 8000
    depends_on:
      - config-mcp
      - agent-twin-mcp
      - archzilla-mcp
    networks:
      - mcp-network
    restart: unless-stopped
    labels:
      - "service=mcp-registry"
      - "type=gateway"

  # ============================================================================
  # Infrastructure Services (Redis + PostgreSQL for gateway)
  # ============================================================================

  redis:
    image: redis:7-alpine
    networks:
      - mcp-network
    restart: unless-stopped
    labels:
      - "service=redis"
      - "type=infrastructure"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: platform_dev
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - mcp-network
    restart: unless-stopped
    labels:
      - "service=postgres"
      - "type=infrastructure"

networks:
  mcp-network:
    driver: bridge

# ============================================================================
# Volume Definitions (for persistence if needed)
# ============================================================================
volumes:
  config-data:
  session-data:
  auth-data:
  postgres-data:
