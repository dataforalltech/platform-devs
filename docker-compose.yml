      - "type=zilla"

  productzilla-mcp:
    build:
      context: .
      dockerfile: ./productzilla-mcp-server/Dockerfile
    ports:
      - "7123:7100"
    environment:
      NODE_ENV: production
      PORT: 7100
    networks:
      - mcp-network
    restart: unless-stopped
    labels:
      - "mcp=productzilla-mcp"
