version: '3.9'

services:
  # ============================================================================
  # System MCPs (Python - FastAPI)
  # ============================================================================

  agent-twin-mcp:
    build:
      context: .
      dockerfile: agent-twin-mcp-server/Dockerfile
    ports:
      - "7101:7100"
    environment:
      PYTHONPATH: /app:/app/shared
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7100/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - mcp-network
    restart: unless-stopped
    labels:
      - "mcp=agent-twin-mcp"
      - "type=system"
      - "language=python"

  config-mcp:
    build:
      context: .
      dockerfile: config-mcp-server/Dockerfile
    ports:
