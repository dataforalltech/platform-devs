  # ============================================================================

  archzilla-mcp:
    build:
      context: .
      dockerfile: ./archzilla-mcp-server/Dockerfile
    ports:
      - "7118:7100"
    environment:
      NODE_ENV: production
      PORT: 7100
    networks:
      - mcp-network
    restart: unless-stopped
    labels:
      - "mcp=archzilla-mcp"
      - "type=zilla"
      - "language=nodejs"

  backzilla-mcp:
    build:
      context: .
      dockerfile: ./backzilla-mcp-server/Dockerfile
    ports:
      - "7119:7100"
    environment:
