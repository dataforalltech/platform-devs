# =============================================================================
# cd-dev.yml — Continuous Delivery → DEV
#
# Trigger: push em develop (após CI verde)
#
# Imagens geradas:
#   d4all.azurecr.io/dataforall/3.0/<IMAGE_NAME>:dev-<sha7>
#   d4all.azurecr.io/dataforall/3.0/<IMAGE_NAME>:develop-latest
#
# Secrets obrigatórios (GitHub Environment "dev"):
#   ACR_USERNAME            — Service Principal client ID com role AcrPush
#   ACR_PASSWORD            — Service Principal client secret
#   TOKEN_GITHUB            — PAT com escopo repo (para libs privadas)
#   PORTAINER_WEBHOOK_URL   — Webhook do stack DEV no Portainer
#
# Variáveis obrigatórias (repositório):
#   IMAGE_NAME              — Ex: platform-analytics
#
# Variáveis opcionais (environment "dev"):
#   SERVICE_INTERNAL_URL    — Ex: http://platform-analytics:8000/api
#                             Se definida: health check e migration polling
# =============================================================================

name: CD DEV

on:
  push:
    branches:
      - develop

concurrency:
  group: cd-dev-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: d4all.azurecr.io
  IMAGE_PREFIX: dataforall/3.0

jobs:
  build-and-push:
    name: Build & push DEV
    runs-on: ubuntu-latest
    environment: dev

    permissions:
      contents: read

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      image_full: ${{ steps.meta.outputs.image_full }}

    steps:
      - uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        run: |
          SHA7="${GITHUB_SHA:0:7}"
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ vars.IMAGE_NAME }}"
          echo "tag=dev-${SHA7}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "image_full=${IMAGE}:dev-${SHA7}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:dev-${{ github.sha && github.sha || '' }}
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.image }}:develop-latest
          secrets: |
            github_token=${{ secrets.TOKEN_GITHUB }}
          cache-from: type=registry,ref=${{ steps.meta.outputs.image }}:buildcache-dev
          cache-to:   type=registry,ref=${{ steps.meta.outputs.image }}:buildcache-dev,mode=max
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.meta.outputs.tag }}
            com.dataforalltech.environment=dev

  deploy:
    name: Deploy DEV
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: dev

    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: scripts/wait_migrations.sh
          sparse-checkout-cone-mode: false

      - name: Trigger Portainer stack redeploy (DEV)
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.PORTAINER_WEBHOOK_URL }}")
          if [ "${HTTP_STATUS}" -ge 200 ] && [ "${HTTP_STATUS}" -lt 300 ]; then
            echo "Portainer DEV redeployed — HTTP ${HTTP_STATUS}"
          else
            echo "Portainer webhook failed — HTTP ${HTTP_STATUS}"
            exit 1
          fi

      - name: Wait for service health
        if: ${{ vars.SERVICE_INTERNAL_URL != '' }}
        run: |
          MAX=120 elapsed=0
          until curl -sf "${{ vars.SERVICE_INTERNAL_URL }}/health/live" > /dev/null 2>&1; do
            [ $elapsed -ge $MAX ] && { echo "Health check timeout"; exit 1; }
            sleep 5; elapsed=$((elapsed+5))
            echo "[${elapsed}s] Waiting for health..."
          done
          echo "Service DEV is healthy."

      - name: Summary
        run: |
          echo "### Deploy DEV concluído" >> "$GITHUB_STEP_SUMMARY"
          echo "| Campo | Valor |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Serviço | \`${{ vars.IMAGE_NAME }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tag | \`${{ needs.build-and-push.outputs.image_tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Imagem | \`${{ needs.build-and-push.outputs.image_full }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Ambiente | DEV |" >> "$GITHUB_STEP_SUMMARY"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deploy DEV falhou — ${{ vars.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image_tag }}"
