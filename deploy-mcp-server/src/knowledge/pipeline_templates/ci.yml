name: CI

on:
  push:
    branches:
      - develop
      - "release/**"
  pull_request:
    branches:
      - develop
      - main
      - "release/**"

# TOKEN_GITHUB must be a PAT (Personal Access Token) with `repo` scope for the
# dataforalltech org. GITHUB_TOKEN (built-in) only covers the current repo and
# cannot install private libs from other repositories.
#
# Set it at: Settings → Secrets and variables → Actions → New repository secret
#   Name:  TOKEN_GITHUB
#   Value: ghp_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx

jobs:
  # ── Lint & type-check ───────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Configure git for private platform libs
        env:
          TOKEN_GITHUB: ${{ secrets.TOKEN_GITHUB }}
        run: |
          # Rewrite all SSH URL variants → HTTPS with PAT.
          # pip uses git+ssh://, git may use ssh:// or SCP-style git@github.com:
          git config --global url."https://${TOKEN_GITHUB}@github.com/".insteadOf "git+ssh://git@github.com/"
          git config --global url."https://${TOKEN_GITHUB}@github.com/".insteadOf "ssh://git@github.com/"
          git config --global url."https://${TOKEN_GITHUB}@github.com/".insteadOf "git@github.com:"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Format check (black)
        run: black --check app/ src/ tests/

      - name: Lint (ruff)
        run: ruff check app/ src/ tests/

      - name: Type check (mypy)
        run: mypy app/ src/ --ignore-missing-imports --no-error-summary

      - name: Validate module structure
        run: python scripts/validate_module_structure.py

  # ── Dependency security audit ───────────────────────────────────────────────
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Configure git for private platform libs
        env:
          TOKEN_GITHUB: ${{ secrets.TOKEN_GITHUB }}
        run: |
          git config --global url."https://${TOKEN_GITHUB}@github.com/".insteadOf "git+ssh://git@github.com/"
          git config --global url."https://${TOKEN_GITHUB}@github.com/".insteadOf "ssh://git@github.com/"
          git config --global url."https://${TOKEN_GITHUB}@github.com/".insteadOf "git@github.com:"

      - name: Audit dependencies for known CVEs
        run: pip-audit -r requirements.txt --progress-spinner off

  # ── OpenAPI schema drift detection ─────────────────────────────────────────
  api-contract:
    runs-on: ubuntu-latest
    needs: lint
    env:
      ENVIRONMENT: test
      DB_ENGINE: postgresql
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: app
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET_KEY: ci-test-secret-key-not-for-production-use
      KAFKA_ENABLED: "false"
      OTEL_TRACES_ENABLED: "false"
      DOCS_ENABLED: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Configure git for private platform libs
        env:
          TOKEN_GITHUB: ${{ secrets.TOKEN_GITHUB }}
        run: |
          git config --global url."https://${TOKEN_GITHUB}@github.com/".insteadOf "git+ssh://git@github.com/"
          git config --global url."https://${TOKEN_GITHUB}@github.com/".insteadOf "ssh://git@github.com/"
          git config --global url."https://${TOKEN_GITHUB}@github.com/".insteadOf "git@github.com:"

      - run: pip install -r requirements.txt

      - name: Export OpenAPI schema
        run: |
          python -c "
          from app.main import app
          import json, pathlib
          schema = app.openapi()
          pathlib.Path('openapi.json').write_text(json.dumps(schema, indent=2))
          print('OpenAPI schema exported.')
          "

      - name: Upload OpenAPI schema artifact
        uses: actions/upload-artifact@v4
        with:
          name: openapi-schema
          path: openapi.json
          retention-days: 30

      - name: Check schema drift (oasdiff)
        uses: oasdiff/oasdiff-action/breaking@main
        continue-on-error: true   # warn only — set to false to block on breaking changes
        with:
          base: "https://raw.githubusercontent.com/${{ github.repository }}/main/openapi.json"
          revision: openapi.json

  # ── Unit & integration tests ────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5

    env:
      ENVIRONMENT: test
      DB_ENGINE: postgresql
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: test_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      RATE_LIMIT_STORAGE_URI: redis://localhost:6379/0
      JWT_SECRET_KEY: ci-test-secret-key-not-for-production-use
      KAFKA_ENABLED: "false"
      KAFKA_CONSUMER_ENABLED: "false"
      OTEL_TRACES_ENABLED: "false"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Configure git for private platform libs
        env:
          TOKEN_GITHUB: ${{ secrets.TOKEN_GITHUB }}
        run: |
          git config --global url."https://${TOKEN_GITHUB}@github.com/".insteadOf "git+ssh://git@github.com/"
          git config --global url."https://${TOKEN_GITHUB}@github.com/".insteadOf "ssh://git@github.com/"
          git config --global url."https://${TOKEN_GITHUB}@github.com/".insteadOf "git@github.com:"

      - run: pip install -r requirements.txt

      - name: Install service as editable lib (makes src/ importable in tests)
        run: pip install -e .

      - name: Apply database migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest tests/ -v --cov=app --cov-report=xml --cov-fail-under=70

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
