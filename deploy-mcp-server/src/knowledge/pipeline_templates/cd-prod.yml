# =============================================================================
# cd-prod.yml — Continuous Delivery → PROD
#
# Trigger: tag v*.*.* (ex: v1.3.0, v2.0.1)
#
# Imagens geradas:
#   d4all.azurecr.io/dataforall/3.0/<IMAGE_NAME>:v1.3.0
#   d4all.azurecr.io/dataforall/3.0/<IMAGE_NAME>:prod-latest
#
# APROVAÇÃO MANUAL OBRIGATÓRIA — configurada no GitHub Environment "prod"
#   Settings → Environments → prod → Required reviewers
#
# Secrets obrigatórios (GitHub Environment "prod"):
#   ACR_USERNAME            — Service Principal client ID com role AcrPush
#   ACR_PASSWORD            — Service Principal client secret
#   TOKEN_GITHUB            — PAT com escopo repo (para libs privadas)
#   PORTAINER_WEBHOOK_URL   — Webhook do stack PROD no Portainer
#   INTERNAL_API_TOKEN      — Token para /internal/* routes (migration polling)
#
# Variáveis obrigatórias (repositório):
#   IMAGE_NAME              — Ex: platform-analytics
#
# Variáveis obrigatórias (environment "prod"):
#   SERVICE_INTERNAL_URL    — Ex: http://platform-analytics:8000/api
# =============================================================================

name: CD PROD

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: cd-prod
  cancel-in-progress: false   # nunca cancelar deploy de produção em andamento

env:
  REGISTRY: d4all.azurecr.io
  IMAGE_PREFIX: dataforall/3.0

jobs:
  build-and-push:
    name: Build & push PROD
    runs-on: ubuntu-latest

    permissions:
      contents: read

    outputs:
      semver: ${{ steps.meta.outputs.semver }}
      image_tag: ${{ steps.meta.outputs.tag }}
      image_full: ${{ steps.meta.outputs.image_full }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate semver tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if ! echo "${TAG}" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Tag '${TAG}' não segue vMAJOR.MINOR.PATCH — abortando."
            exit 1
          fi
          echo "Tag válida: ${TAG}"

      - name: Set image metadata
        id: meta
        run: |
          TAG="${GITHUB_REF#refs/tags/}"        # v1.3.0
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ vars.IMAGE_NAME }}"
          echo "semver=${TAG}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "image_full=${IMAGE}:${TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.image }}:prod-latest
          secrets: |
            github_token=${{ secrets.TOKEN_GITHUB }}
          cache-from: type=registry,ref=${{ steps.meta.outputs.image }}:buildcache-prod
          cache-to:   type=registry,ref=${{ steps.meta.outputs.image }}:buildcache-prod,mode=max
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.meta.outputs.tag }}
            com.dataforalltech.environment=prod

  # ── Gate de aprovação manual ─────────────────────────────────────────────────
  # O job "deploy" usa o environment "prod", que DEVE ter Required Reviewers
  # configurados em: Settings → Environments → prod → Required reviewers
  # Sem isso, o deploy ocorre sem aprovação — configure antes de usar em produção.
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy PROD (aprovação obrigatória)
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: prod         # ← gate de aprovação manual aqui

    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: scripts/wait_migrations.sh
          sparse-checkout-cone-mode: false

      - name: Trigger Portainer stack redeploy (PROD)
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.PORTAINER_WEBHOOK_URL }}")
          if [ "${HTTP_STATUS}" -ge 200 ] && [ "${HTTP_STATUS}" -lt 300 ]; then
            echo "Portainer PROD redeployed — HTTP ${HTTP_STATUS}"
            echo "Versão: ${{ needs.build-and-push.outputs.semver }}"
          else
            echo "Portainer webhook failed — HTTP ${HTTP_STATUS}"
            exit 1
          fi

      - name: Wait for service health
        run: |
          MAX=180 elapsed=0
          until curl -sf "${{ vars.SERVICE_INTERNAL_URL }}/health/live" > /dev/null 2>&1; do
            [ $elapsed -ge $MAX ] && { echo "Health check timeout"; exit 1; }
            sleep 5; elapsed=$((elapsed+5))
            echo "[${elapsed}s] Waiting for health..."
          done
          echo "Service PROD is healthy."

      - name: Wait for tenant migrations
        env:
          INTERNAL_API_TOKEN: ${{ secrets.INTERNAL_API_TOKEN }}
          MAX_WAIT: "600"
        run: bash scripts/wait_migrations.sh "${{ vars.SERVICE_INTERNAL_URL }}"

      - name: Summary
        run: |
          echo "### Deploy PROD concluído ✓" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Campo | Valor |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Serviço | \`${{ vars.IMAGE_NAME }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Versão | \`${{ needs.build-and-push.outputs.semver }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Imagem | \`${{ needs.build-and-push.outputs.image_full }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Ambiente | **PROD** |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deploy PROD FALHOU — ${{ vars.IMAGE_NAME }}:${{ needs.build-and-push.outputs.semver }}"
          echo "Verificar logs e iniciar procedimento de rollback:"
          echo "  docs/devops/rollback.md"
