# =============================================================================
# deploy.yml — Build · Push ACR · Portainer webhook
#
# Triggers automatically when CI passes on main.
# Manual re-deploy available via Actions → Deploy → Run workflow.
#
# Required secrets (Settings → Secrets and variables → Actions):
#   ACR_USERNAME           — Azure Container Registry service principal client ID
#   ACR_PASSWORD           — Azure Container Registry service principal client secret
#   PORTAINER_WEBHOOK_URL  — Stack webhook URL from Portainer (Stack → Webhooks)
#
# Required variables (Settings → Secrets and variables → Actions → Variables):
#   IMAGE_NAME             — e.g. platform-analytics
#                            (matches the service container name in the stack)
#
# Image registry: d4all.azurecr.io/dataforall/3.0/{IMAGE_NAME}
# Image tags:
#   :v3.{YYYYMMDD}-{sha7}  — immutable, pinnable (set in Portainer env as {SERVICE}_VERSION)
#   :latest                 — mutable alias, always points to the most recent deploy
# =============================================================================

name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "production"
        type: choice
        options: [production, staging]

# Prevent concurrent deploys to the same stack
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: d4all.azurecr.io
  IMAGE_PREFIX: dataforall/3.0

jobs:
  # ── Build & push Docker image to ACR ─────────────────────────────────────
  build-and-push:
    name: Build & push to ACR
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    permissions:
      contents: read

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      image_full: ${{ steps.meta.outputs.image_full }}

    steps:
      - name: Resolve commit SHA
        id: sha
        run: |
          SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "sha_short=${SHA:0:7}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.sha.outputs.sha }}

      - name: Set image metadata
        id: meta
        run: |
          DATE=$(date +%Y%m%d)
          SHA7="${{ steps.sha.outputs.sha_short }}"
          TAG="v3.${DATE}-${SHA7}"
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ vars.IMAGE_NAME }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "image_full=${IMAGE}:${TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
          # BuildKit secret: TOKEN_GITHUB is injected into the RUN layer via
          # --mount=type=secret and never lands in the image or its cache.
          secrets: |
            github_token=${{ secrets.TOKEN_GITHUB }}
          # Registry-based layer cache keeps builds fast without extra infra
          cache-from: type=registry,ref=${{ steps.meta.outputs.image }}:buildcache
          cache-to:   type=registry,ref=${{ steps.meta.outputs.image }}:buildcache,mode=max
          labels: |
            org.opencontainers.image.revision=${{ steps.sha.outputs.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.meta.outputs.tag }}

  # ── Trigger Portainer stack redeploy ─────────────────────────────────────
  deploy:
    name: Portainer webhook
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: ${{ github.event.inputs.environment || 'production' }}

    # Required secrets (beyond build-and-push):
    #   INTERNAL_API_TOKEN       — X-Internal-Token for /internal/* routes
    #
    # Required variables:
    #   SERVICE_INTERNAL_URL     — e.g. http://platform-analytics:8000/api
    #                              Must be reachable from the GitHub Actions runner.
    #                              Leave empty to skip migration polling.

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          sparse-checkout: scripts/wait_migrations.sh
          sparse-checkout-cone-mode: false

      - name: Trigger Portainer stack redeploy
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.PORTAINER_WEBHOOK_URL }}")

          if [ "${HTTP_STATUS}" -ge 200 ] && [ "${HTTP_STATUS}" -lt 300 ]; then
            echo "Portainer redeploy triggered — HTTP ${HTTP_STATUS}"
            echo "Image: ${{ needs.build-and-push.outputs.image_full }}"
          else
            echo "Portainer webhook failed — HTTP ${HTTP_STATUS}"
            exit 1
          fi

      - name: Wait for service health
        if: ${{ vars.SERVICE_INTERNAL_URL != '' }}
        run: |
          MAX=120 elapsed=0
          until curl -sf "${{ vars.SERVICE_INTERNAL_URL }}/health/live" > /dev/null 2>&1; do
            [ $elapsed -ge $MAX ] && { echo "Health check timeout"; exit 1; }
            sleep 5; elapsed=$((elapsed+5))
            echo "[${elapsed}s] Waiting for health..."
          done
          echo "Service is healthy."

      - name: Wait for tenant migrations
        if: ${{ vars.SERVICE_INTERNAL_URL != '' && secrets.INTERNAL_API_TOKEN != '' }}
        env:
          INTERNAL_API_TOKEN: ${{ secrets.INTERNAL_API_TOKEN }}
          MAX_WAIT: "300"
        run: bash scripts/wait_migrations.sh "${{ vars.SERVICE_INTERNAL_URL }}"

      - name: Summary
        run: |
          echo "### Deploy complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Service | \`${{ vars.IMAGE_NAME }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tag | \`${{ needs.build-and-push.outputs.image_tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | \`${{ needs.build-and-push.outputs.image_full }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Portainer | stack redeployed via webhook |" >> "$GITHUB_STEP_SUMMARY"

      - name: Notify on failure
        if: failure()
        run: |
          echo "Deploy failed for ${{ vars.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image_tag }}"
          # Uncomment to enable Slack alerts:
          # curl -s -X POST "${{ secrets.SLACK_WEBHOOK }}" \
          #   -H "Content-Type: application/json" \
          #   -d "{\"text\":\"Deploy failed: ${{ vars.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image_tag }}\"}"
