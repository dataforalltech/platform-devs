env: prod
min_score: 0.85

required_checkers:
  structure:
    - has_src_dir
    - has_tests_dir
    - has_pyproject_toml
    - has_dockerfile
  tests:
    - has_tests
    - min_coverage_80
  security:
    - no_hardcoded_credentials
    - no_critical_vulnerabilities
    - no_high_vulnerabilities
  docs:
    - has_readme
    - has_env_vars_documented
    - has_runbook
    - has_rollback_plan
  lint:
    - ruff_passing

ideal_checkers:
  tests:
    - min_coverage_90
  docs:
    - has_adr
    - has_load_testing
    - has_sla

approval_rules:
  low:
    required_approvals: 1
    required_roles:
      - developer
  medium:
    required_approvals: 2
    required_roles:
      - developer
      - lead
  high:
    required_approvals: 2
    required_roles:
      - developer
      - lead
  critical:
    required_approvals: 2
    required_roles:
      - developer
      - lead
      - architect
