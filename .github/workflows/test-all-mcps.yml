name: Test All 18 MCPs (Parallel)

on:
  push:
    branches:
      - develop
      - main
      - master
  pull_request:
    branches:
      - develop
      - main
      - master

jobs:
  test-infrastructure-mcps:
    name: Test Infrastructure MCP - ${{ matrix.mcp }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      max-parallel: 6
      fail-fast: false
      matrix:
        mcp:
          - session-mcp-server
          - test-mcp-server
          - config-mcp-server
          - services-mcp-server
          - deploy-mcp-server
          - agent-twin-mcp-server
          - docs-mcp-server
          - pipeline-mcp-server
          - qa-mcp-server
          - infra-mcp-server
          - ai-governance-mcp-server
          - audit-mcp-server

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies for ${{ matrix.mcp }}
        run: |
          cd "${{ matrix.mcp }}"
          pip install -e ".[dev]"

      - name: Run linter (ruff)
        run: |
          cd "${{ matrix.mcp }}"
          ruff check src/ tests/
          ruff format --check src/ tests/

      - name: Run type check (mypy)
        run: |
          cd "${{ matrix.mcp }}"
          mypy src/ || true

      - name: Run tests with coverage
        run: |
          cd "${{ matrix.mcp }}"
          pytest tests/ -v --cov=src --cov-report=json --cov-report=term-missing

      - name: Check coverage >= 80%
        run: |
          cd "${{ matrix.mcp }}"
          COVERAGE=$(python -c "import json; cov = json.load(open('coverage.json')); print(cov['totals']['percent_covered'])")
          if (( $(echo "$COVERAGE < 80" | bc -l) )); then
            echo "Coverage is ${COVERAGE}% — required minimum 80%"
            exit 1
          fi
          echo "Coverage: ${COVERAGE}%"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.mcp }}
          path: ${{ matrix.mcp }}/coverage.json

  test-service-mcps:
    name: Test Service MCP - ${{ matrix.mcp }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      max-parallel: 6
      fail-fast: false
      matrix:
        mcp:
          - auth-mcp-server
          - admin-mcp-server
          - governance-mcp-server
          - scheduler-mcp-server
          - connectors-mcp-server
          - cache-mcp-server

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies for ${{ matrix.mcp }}
        run: |
          cd "services/${{ matrix.mcp }}"
          pip install -e ".[dev]"

      - name: Run linter (ruff)
        run: |
          cd "services/${{ matrix.mcp }}"
          ruff check src/ tests/
          ruff format --check src/ tests/

      - name: Run type check (mypy)
        run: |
          cd "services/${{ matrix.mcp }}"
          mypy src/ || true

      - name: Run tests with coverage
        run: |
          cd "services/${{ matrix.mcp }}"
          pytest tests/ -v --cov=src --cov-report=json --cov-report=term-missing

      - name: Check coverage >= 80%
        run: |
          cd "services/${{ matrix.mcp }}"
          COVERAGE=$(python -c "import json; cov = json.load(open('coverage.json')); print(cov['totals']['percent_covered'])")
          if (( $(echo "$COVERAGE < 80" | bc -l) )); then
            echo "Coverage is ${COVERAGE}% — required minimum 80%"
            exit 1
          fi
          echo "Coverage: ${COVERAGE}%"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.mcp }}
          path: services/${{ matrix.mcp }}/coverage.json

  coverage-summary:
    name: Coverage Summary
    runs-on: ubuntu-latest
    needs: [test-infrastructure-mcps, test-service-mcps]
    if: always()
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: coverage-reports

      - name: Generate coverage summary
        run: |
          echo "# MCP Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Infrastructure MCPs (12)" >> $GITHUB_STEP_SUMMARY
          find coverage-reports -name "coverage-*mcp-server" -type d | sort | while read dir; do
            mcp=$(basename "$dir" | sed 's/coverage-//')
            if [ -f "$dir/coverage.json" ]; then
              coverage=$(python -c "import json; cov = json.load(open('$dir/coverage.json')); print(f\"{cov['totals']['percent_covered']:.1f}%\")" 2>/dev/null || echo "N/A")
              echo "- $mcp: $coverage" >> $GITHUB_STEP_SUMMARY
            fi
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Service MCPs (6)" >> $GITHUB_STEP_SUMMARY
          find coverage-reports -path "*/coverage-*mcp-server" -type d | grep -v ".github" | sort | while read dir; do
            mcp=$(basename "$dir" | sed 's/coverage-//')
            if [ -f "$dir/coverage.json" ]; then
              coverage=$(python -c "import json; cov = json.load(open('$dir/coverage.json')); print(f\"{cov['totals']['percent_covered']:.1f}%\")" 2>/dev/null || echo "N/A")
              echo "- $mcp: $coverage" >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: Check all tests passed
        if: |
          needs.test-infrastructure-mcps.result == 'failure' ||
          needs.test-service-mcps.result == 'failure'
        run: |
          echo "Some MCP tests failed. Review logs above."
          exit 1
