name: CI

on:
  pull_request:
    paths:
      - '**/*.py'
      - 'pyproject.toml'
      - '.github/workflows/ci.yml'
  push:
    branches: [main, develop, 'feat/**']
    paths:
      - '**/*.py'
      - 'pyproject.toml'

jobs:
  test:
    name: Test all servers
    runs-on: ubuntu-latest
    strategy:
      matrix:
        server: [
          session-mcp-server,
          test-mcp-server,
          docs-mcp-server,
          services-mcp-server,
          pipeline-mcp-server,
          qa-mcp-server,
          deploy-mcp-server,
          agent-twin-mcp-server,
          config-mcp-server,
          infra-mcp-server,
          ai-governance-mcp-server,
          audit-mcp-server
        ]
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install server dependencies
        run: |
          cd ${{ matrix.server }}
          pip install -e ".[dev]"
      
      - name: Lint with ruff
        run: |
          cd ${{ matrix.server }}
          ruff check .
          ruff format . --check
      
      - name: Type check with mypy
        run: |
          cd ${{ matrix.server }}
          mypy src/ || true
      
      - name: Run tests
        run: |
          cd ${{ matrix.server }}
          pytest -v --cov=src --cov-report=term-missing --cov-report=xml
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./${{ matrix.server }}/coverage.xml
          flags: ${{ matrix.server }}

  test-typescript:
    name: Test TypeScript servers
    runs-on: ubuntu-latest
    strategy:
      matrix:
        server: [
          frontzilla-pixelfera-mcp-server
        ]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '${{ matrix.server }}/package-lock.json'

      - name: Install dependencies
        run: |
          cd ${{ matrix.server }}
          npm ci

      - name: Lint with ESLint
        run: |
          cd ${{ matrix.server }}
          npm run lint

      - name: Type check with TypeScript
        run: |
          cd ${{ matrix.server }}
          npm run type-check

      - name: Run tests
        run: |
          cd ${{ matrix.server }}
          npm test

      - name: Build
        run: |
          cd ${{ matrix.server }}
          npm run build

  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Run bandit
        run: |
          pip install bandit
          bandit -r shared/ -f json || true
