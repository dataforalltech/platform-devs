# Quality Gates Configuration
# Integração com Pipeline-MCP e OpsZilla

gates:
  # ============================================================================
  # Gate 1: Repository Completeness
  # ============================================================================
  repo_completeness:
    name: Repository Completeness
    description: Verify all active repos are cloned locally
    enabled: true

    checks:
      - name: Total repos cloned
        type: threshold
        metric: repos_cloned
        operator: ">="
        target: 62
        severity: critical

      - name: Coverage percentage
        type: threshold
        metric: clone_coverage
        operator: ">="
        target: 95
        severity: high

  # ============================================================================
  # Gate 2: Branch Synchronization
  # ============================================================================
  branch_sync:
    name: Branch Synchronization
    description: Verify develop branch is synced across repos
    enabled: true

    checks:
      - name: Repos with develop
        type: threshold
        metric: with_develop
        operator: ">="
        target: 50
        severity: high

      - name: Branch coverage
        type: threshold
        metric: develop_coverage
        operator: ">="
        target: 80
        severity: medium

  # ============================================================================
  # Gate 3: Synchronization Health
  # ============================================================================
  sync_health:
    name: Synchronization Health
    description: Verify sync operations completed successfully
    enabled: true

    checks:
      - name: Sync failures
        type: threshold
        metric: sync_failures
        operator: "<="
        target: 5
        severity: high

      - name: Recent sync (24h)
        type: threshold
        metric: synced_24h
        operator: ">="
        target: 40
        severity: medium

  # ============================================================================
  # Gate 4: Data Consistency
  # ============================================================================
  data_consistency:
    name: Data Consistency
    description: Verify filesystem and database are in sync
    enabled: true

    checks:
      - name: Discrepancies
        type: threshold
        metric: discrepancies
        operator: "<="
        target: 20
        severity: high

      - name: Reconciliation status
        type: threshold
        metric: reconciled
        operator: ">="
        target: 90
        severity: medium

# ============================================================================
# Quality Gate Policies
# ============================================================================
policies:
  # Policy for automated executions
  automated:
    gates:
      - repo_completeness
      - branch_sync
      - sync_health
    fail_on_critical: true
    fail_on_high: false

  # Policy for manual releases
  release:
    gates:
      - repo_completeness
      - branch_sync
      - sync_health
      - data_consistency
    fail_on_critical: true
    fail_on_high: true

# ============================================================================
# Notifications & Escalation
# ============================================================================
notifications:
  slack:
    enabled: true
    channel: "#devops"
    on_failure: true
    on_warning: false

  email:
    enabled: true
    recipients:
      - caiog@dataforall.tech
    on_critical: true
    on_high: false

# ============================================================================
# Dashboards & Observability
# ============================================================================
observability:
  opszilla:
    enabled: true
    dashboard: "repo-sync-metrics"
    metrics:
      - repos_cloned
      - clone_coverage
      - with_develop
      - develop_coverage
      - sync_failures
      - discrepancies
      - last_sync_timestamp

  alerts:
    - name: Low clone coverage
      condition: clone_coverage < 90
      severity: warning
      action: notify

    - name: Develop branch not synced
      condition: develop_coverage < 70
      severity: critical
      action: notify + escalate

    - name: High discrepancies
      condition: discrepancies > 30
      severity: high
      action: notify

    - name: Sync failures
      condition: sync_failures > 5
      severity: critical
      action: notify + escalate + create_issue

# ============================================================================
# SLOs (Service Level Objectives)
# ============================================================================
slos:
  availability:
    target: 99.9%
    window: 30d

  sync_timeliness:
    target: 95%
    window: 7d
    threshold: 24h

  data_accuracy:
    target: 99.0%
    window: 30d
